version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gold-vola-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gold_vola_db
      TZ: Asia/Tokyo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
    container_name: gold-vola-backend
    environment:
      DATABASE_URL: postgres://user:password@db:5432/gold_vola_db
      TZ: Asia/Tokyo
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
