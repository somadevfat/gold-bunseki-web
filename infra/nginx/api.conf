# ============================
# HTTP → HTTPS リダイレクト
# Let's Encrypt の証明書取得時もこのブロックが必要
# ============================
server {
    listen 80;
    server_name api.fanda-dev.com;

    # Let's Encrypt の所有権確認に使う
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # それ以外はすべて HTTPS へリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================
# HTTPS + リバースプロキシ
# ============================
server {
    listen 443 ssl;
    server_name api.fanda-dev.com;

    # Let's Encrypt の証明書パス (certbot が自動生成)
    ssl_certificate     /etc/letsencrypt/live/api.fanda-dev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fanda-dev.com/privkey.pem;

    # TLS 推奨設定
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # セキュリティヘッダー
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Docker コンテナ(Hono/Bun) へのリバースプロキシ
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 対応 (将来必要になる場合のため)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 実クライアント情報をバックエンドに伝える
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
