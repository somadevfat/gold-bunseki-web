name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch: # 手動実行ボタン

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if unwanted HTML/test artifacts are tracked
        shell: bash
        run: |
          set -euo pipefail

          forbidden="$(
            {
              git ls-files -- 'apps/frontend/playwright-report/**' 'apps/frontend/test-results/**' || true
              git ls-files -- '*.html' | grep -v '^public/' || true
            } | sort -u
          )"

          if [[ -n "${forbidden}" ]]; then
            echo "Unwanted tracked files detected. Remove them from git history/tracking and ensure .gitignore is correct:"
            echo "${forbidden}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Lint
        run: bun run lint:all

      - name: Run Tests
        env:
          API_TOKEN: ci-test-token
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
        run: bun run test:all
