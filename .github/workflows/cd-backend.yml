name: CD Backend

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # 手動デプロイボタン

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCR_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/gold-vola-backend
  BACKEND_BASE_URL: https://api.fanda-dev.com

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    # CIが成功した時のみデプロイする
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Workload Identity Federation で認証（JSON キー不要）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # ビルド & GCR へ Push
      - name: Build and Push Docker image
        run: |
          docker build \
            -t ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            -t ${{ env.GCR_IMAGE }}:latest \
            ./apps/backend
          docker push ${{ env.GCR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.GCR_IMAGE }}:latest

      - name: Deploy to GCE
        run: |
          gcloud compute ssh ${{ secrets.GCE_USER }}@${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --tunnel-through-iap \
            --command="
              cd ~/gold-bunseki-web &&
              git fetch origin main &&
              git reset --hard ${{ github.sha }} &&
              test \"\$(git rev-parse HEAD)\" = \"${{ github.sha }}\" &&
              git rev-parse HEAD &&
              gcloud auth configure-docker --quiet &&
              export BACKEND_IMAGE=${{ env.GCR_IMAGE }}:${{ github.sha }} &&
              export BACKEND_BASE_URL=${{ env.BACKEND_BASE_URL }} &&
              sudo env BACKEND_IMAGE=\"\$BACKEND_IMAGE\" docker-compose config | sed -n '/backend:/,/^[^ ]/p' &&
              sudo env BACKEND_IMAGE=\"\$BACKEND_IMAGE\" docker-compose pull backend &&
              sudo env BACKEND_IMAGE=\"\$BACKEND_IMAGE\" docker-compose run --rm backend bun run src/infrastructure/database/migrate.ts &&
              sudo env BACKEND_IMAGE=\"\$BACKEND_IMAGE\" docker-compose up -d --force-recreate backend &&
              for url in \"\$BACKEND_BASE_URL/health\" \"\$BACKEND_BASE_URL/api/auth/get-session\"; do
                for attempt in 1 2 3 4 5; do
                  curl -fsS \"\$url\" && break
                  if [ \"\$attempt\" = \"5\" ]; then exit 1; fi
                  sleep 2
                done
              done
            "
